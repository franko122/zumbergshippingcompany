<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipment Details</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
        background: #f4f7fb;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:95%;
        max-width:600px;
        background:#fff;
        border-radius:15px;
        box-shadow:0 10px 30px rgba(0,0,0,0.1);
        overflow:hidden;
    }

    .header{
        background: linear-gradient(135deg,#28a745,#00c851);
        color:white;
        text-align:center;
        padding:20px;
        font-size:18px;
        font-weight:600;
    }

    .image-box img{
        width:100%;
        height:200px;
        object-fit:cover;
    }

    .content{
        padding:20px;
    }

    .info{
        margin-bottom:15px;
        padding:10px 15px;
        background:#f9f9f9;
        border-radius:10px;
        font-size:14px;
    }

    .info strong{
        color:#28a745;
    }

    .btn-container{
        text-align:center;
        margin-top:25px;
    }

    .nowx{
        padding:14px 35px;
        font-size:16px;
        border:none;
        border-radius:30px;
        background:linear-gradient(45deg,#ff4b2b,#ff416c);
        color:white;
        cursor:pointer;
        transition:0.3s;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .nowx:hover{
        transform:translateY(-3px);
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .footer{
        text-align:center;
        font-size:12px;
        color:#888;
        padding:10px;
    }

</style>
</head>

<body>

<div class="container">

    <div class="header">
        📦 Package shipped successfully to Kate Katherine, yemen 🇧🇩
    </div>

    <div class="image-box">
        <img src="./mm.jpg" alt="Shipment Image">
    </div>

    <div class="content">

        <div class="info"><strong>Sender:</strong> Kate Katherine </div>
        <div class="info"><strong>country:</strong> Yemen</div>
        <div class="info"><strong>Receiver:</strong>Yasir Baqer Al-Tayyar</div>
        <div class="info"><strong>Address</strong> Iraq, Baghdad, Karrada</div>
,        <div class="info"><strong>Email:</strong>yasiraltayar@gmail.com</div>
        <div class="info"><strong>Phone</strong>0776 159 5851</div>
        <div class="info"><strong>Departure date</strong> 22/3/2026/div>
        <div class="info"><strong> Arival </strong> 24/3/2026</div>
        

        <div class="btn-container">
            <a href="https://share.google/OEtkggRsAFzh8bGKy">
                <button class="nowx">📍 Track on Map</button>
            </a>
        </div>

    </div>

    <div class="footer">
        Shipment Tracking System © 2026
    </div>

</div>
